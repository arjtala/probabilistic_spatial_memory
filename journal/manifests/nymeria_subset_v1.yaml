# Nymeria session subset for the Wearables AI 2026 paper (v1).
#
# 20 sessions = 5 paired dates × 2 wearer slots × 2 activity variants.
# Designed so we get:
#   - 5 same-date wearer pairs (s0 + s1) for the federated-memory
#     experiment (HLL union across two wearers in the same physical
#     space at the same time).
#   - 2 contrasting activities per wearer (act0 + act2) to probe
#     cross-activity retrieval and same-place / different-activity
#     revisitation.
#   - Diversity across capture dates spanning June-July 2023.
#
# This is the version-controlled source of truth for which sessions
# are in v1 of the paper. If we add/drop sessions, edit this file +
# regenerate extractions; don't silently re-glob.
#
# Source listing: `ls /checkpoint/dream/arjangt/video_retrieval/nymeria`
# (the full release is ~430 sessions; this is a deliberate subset).

dataset_root: /checkpoint/dream/arjangt/video_retrieval/nymeria

# Selection criteria: every date listed below must have BOTH s0 and s1
# present, and BOTH act0 and act2 for each wearer slot. Verified by
# eyeballing the directory listing on 2026-05-28.
pairs:
  - date: "20230607"
    wearers:
      s0:
        name: james_johnson
        sessions:
          act0: 20230607_s0_james_johnson_act0_e72nhq
          act2: 20230607_s0_james_johnson_act2_yhbvpa
      s1:
        name: barbara_wheeler
        sessions:
          act0: 20230607_s1_barbara_wheeler_act0_cvxtsi
          act2: 20230607_s1_barbara_wheeler_act2_ig1oym

  - date: "20230612"
