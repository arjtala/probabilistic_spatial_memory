<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="Helvetica, Arial, sans-serif">
  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a1a">Headline lift: v1 baseline → v2 follow-up</text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#555">exemplar Hit @5 across 5 reservoir-sampler seeds (mean ± std)</text>

  <!-- Plot area: x bands per session, y in [80, 320] -->
  <!-- y(0%) = 320, y(100%) = 80, range 240px = 100% -->

  <!-- Y gridlines -->
  <g stroke="#e5e5e5" stroke-width="1">
    <line x1="80" y1="80" x2="660" y2="80"/>
    <line x1="80" y1="140" x2="660" y2="140"/>
    <line x1="80" y1="200" x2="660" y2="200"/>
    <line x1="80" y1="260" x2="660" y2="260"/>
    <line x1="80" y1="320" x2="660" y2="320"/>
  </g>

  <!-- Y axis -->
  <line x1="80" y1="80" x2="80" y2="320" stroke="#333" stroke-width="1.2"/>
  <g font-size="11" fill="#333" text-anchor="end">
    <text x="73" y="84">100%</text>
    <text x="73" y="144">75%</text>
    <text x="73" y="204">50%</text>
    <text x="73" y="264">25%</text>
    <text x="73" y="324">0%</text>
  </g>
  <text x="30" y="200" text-anchor="middle" font-size="12" fill="#333" transform="rotate(-90 30 200)">exemplar Hit @5</text>

  <!-- X axis -->
  <line x1="80" y1="320" x2="660" y2="320" stroke="#333" stroke-width="1.2"/>

  <!-- Four session groups: Fulham(A), Tucson(B), Palo Alto(C), Combined.
       Each group has 3 bars: v1 (CLIP-L, 4 q), v2 full (CLIP-L, 7 q), v2 full (bigG, 7 q).
       Group spacing: 4 groups across [100, 640] = 540px → 135px per group.
       Bars: 3 × 30px wide + 3px gap = 99px, centered in each group. -->

  <!-- v1 numbers (4 questions, CLIP-L) from previous doc:
         Fulham(A): 55% ± 20.9%
         Tucson(B): 100% ± 0%
         Palo Alto(C): 50% ± 0%
         combined: 68.3% ± 7.0%
       v2 numbers (7 scoreable per session, full set; from §2 table the per-session split isn't listed
       but combined CLIP-L = 79.0% ± 2.2% and bigG combined = 83.0% ± 2.7%; per-session v2 numbers per
       what the journal aggregator showed earlier (§2 + per-seed reads):
         Fulham(A) bigG:    71.4% ± 0%
         Tucson(B) bigG:    100%  ± 0%
         Palo Alto(C) bigG: 82.5% ± 6.8%
         combined bigG:     83.0% ± 2.7%
         combined CLIP-L:   79.0% ± 2.2% (from §2 table) -->

  <!-- Color palette -->
  <!-- v1 (CLIP-L baseline): grey -->
  <!-- v2 CLIP-L: teal -->
  <!-- v2 bigG:  navy -->

  <!-- Group 1: Fulham (A), center at 167.5 -->
  <!-- v1 55% bar: y(55) = 320 - 55/100*240 = 320 - 132 = 188; height = 132 -->
  <rect x="125" y="188" width="28" height="132" fill="#a3a3a3"/>
  <!-- v2 CLIP-L (Fulham): unknown per-session split → omit, use bigG only -->
  <!-- We'll show 2 bars instead: v1 baseline (4q) vs v2 full (7q, bigG) for cleaner story -->
  <rect x="158" y="148" width="28" height="172" fill="#1f4e79"/>
  <!-- error bars -->
  <!-- v1 ±20.9% = ±50.16px -->
  <line x1="139" y1="137.84" x2="139" y2="238.16" stroke="#333" stroke-width="1.2"/>
  <line x1="134" y1="137.84" x2="144" y2="137.84" stroke="#333" stroke-width="1.2"/>
  <line x1="134" y1="238.16" x2="144" y2="238.16" stroke="#333" stroke-width="1.2"/>
  <!-- v2 bigG Fulham 71.4% ± 0% (deterministic) — no error bar -->

  <!-- Bar value labels above each bar -->
  <text x="139" y="183" text-anchor="middle" font-size="10" fill="#333">55%</text>
  <text x="172" y="143" text-anchor="middle" font-size="10" fill="#333" font-weight="600">71%</text>

  <!-- Group label -->
  <text x="155" y="340" text-anchor="middle" font-size="11" fill="#333" font-weight="600">Fulham (A)</text>
  <text x="155" y="354" text-anchor="middle" font-size="9" fill="#666">London · walking</text>

  <!-- Group 2: Tucson (B), center at 302.5 -->
  <!-- v1 100% ± 0% -->
  <rect x="260" y="80" width="28" height="240" fill="#a3a3a3"/>
  <!-- v2 bigG 100% ± 0% -->
  <rect x="293" y="80" width="28" height="240" fill="#1f4e79"/>
  <text x="274" y="75" text-anchor="middle" font-size="10" fill="#333">100%</text>
  <text x="307" y="75" text-anchor="middle" font-size="10" fill="#333" font-weight="600">100%</text>
  <text x="290" y="340" text-anchor="middle" font-size="11" fill="#333" font-weight="600">Tucson (B)</text>
  <text x="290" y="354" text-anchor="middle" font-size="9" fill="#666">Arizona · cycling</text>

  <!-- Group 3: Palo Alto (C), center at 437.5 -->
  <!-- v1 50% ± 0% -->
  <rect x="395" y="200" width="28" height="120" fill="#a3a3a3"/>
  <!-- v2 bigG 82.5% ± 6.8% -->
  <!-- y(82.5) = 320 - 82.5/100*240 = 320 - 198 = 122; height = 198 -->
  <rect x="428" y="122" width="28" height="198" fill="#1f4e79"/>
  <!-- error bars: v2 ±6.8% = ±16.32 -->
  <line x1="442" y1="105.68" x2="442" y2="138.32" stroke="#333" stroke-width="1.2"/>
  <line x1="437" y1="105.68" x2="447" y2="105.68" stroke="#333" stroke-width="1.2"/>
  <line x1="437" y1="138.32" x2="447" y2="138.32" stroke="#333" stroke-width="1.2"/>
  <text x="409" y="195" text-anchor="middle" font-size="10" fill="#333">50%</text>
  <text x="442" y="117" text-anchor="middle" font-size="10" fill="#333" font-weight="600">83%</text>
  <text x="425" y="340" text-anchor="middle" font-size="11" fill="#333" font-weight="600">Palo Alto (C)</text>
  <text x="425" y="354" text-anchor="middle" font-size="9" fill="#666">California · driving</text>

  <!-- Group 4: Combined, center at 572.5 -->
  <!-- v1 68.3% ± 7.0% -->
  <!-- y(68.3) = 320 - 68.3/100*240 = 320 - 163.92 = 156.08; height = 163.92 -->
  <rect x="530" y="156.08" width="28" height="163.92" fill="#a3a3a3"/>
  <!-- v2 bigG 83.0% ± 2.7% -->
  <!-- y(83) = 320 - 83/100*240 = 320 - 199.2 = 120.8; height = 199.2 -->
  <rect x="563" y="120.8" width="28" height="199.2" fill="#1f4e79"/>
  <!-- error bars -->
  <!-- v1 ±7% = ±16.8px -->
  <line x1="544" y1="139.28" x2="544" y2="172.88" stroke="#333" stroke-width="1.2"/>
  <line x1="539" y1="139.28" x2="549" y2="139.28" stroke="#333" stroke-width="1.2"/>
  <line x1="539" y1="172.88" x2="549" y2="172.88" stroke="#333" stroke-width="1.2"/>
  <!-- v2 ±2.7% = ±6.48px -->
  <line x1="577" y1="114.32" x2="577" y2="127.28" stroke="#333" stroke-width="1.2"/>
  <line x1="572" y1="114.32" x2="582" y2="114.32" stroke="#333" stroke-width="1.2"/>
  <line x1="572" y1="127.28" x2="582" y2="127.28" stroke="#333" stroke-width="1.2"/>
  <text x="544" y="151" text-anchor="middle" font-size="10" fill="#333">68%</text>
  <text x="577" y="116" text-anchor="middle" font-size="10" fill="#333" font-weight="600">83%</text>
  <text x="560" y="340" text-anchor="middle" font-size="11" fill="#333" font-weight="600">Combined</text>
  <text x="560" y="354" text-anchor="middle" font-size="9" fill="#666">all sessions</text>

  <!-- Legend -->
  <g font-size="11" fill="#333">
    <rect x="120" y="370" width="16" height="10" fill="#a3a3a3"/>
    <text x="142" y="379">v1 (12 baseline q, CLIP-L)</text>
    <rect x="320" y="370" width="16" height="10" fill="#1f4e79"/>
    <text x="342" y="379">v2 (full 20-q set, OpenCLIP-bigG)</text>
  </g>
</svg>
