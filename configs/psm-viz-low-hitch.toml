# Lower-hitch preset that prioritizes smoother interaction over tile fill speed.
# Override session_dir/video_path/features_path as needed.

session_dir = "./session"

group = "dino"
time_window_sec = 5.0
h3_resolution = 10

scrub_sensitivity_sec = 1.25
map_follow_smoothing = 6.5
video_decode_budget = 4
ingest_record_budget = 96
imu_sample_budget = 384
gps_point_budget = 48
tile_uploads_per_frame = 1

heatmap_mode = "total"
tile_style = "CartoDB.Positron"
